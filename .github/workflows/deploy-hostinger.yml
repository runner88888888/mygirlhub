name: Deploy to Hostinger

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Verify Hostinger deploy secrets
        run: |
          missing=0
          if [ -z "${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}" ]; then
            echo "::error::Missing repository secret HOSTINGER_SSH_PRIVATE_KEY"
            missing=1
          fi
          if [ -z "${{ secrets.HOSTINGER_SSH_HOST }}" ]; then
            echo "::error::Missing repository secret HOSTINGER_SSH_HOST"
            missing=1
          fi
          if [ -z "${{ secrets.HOSTINGER_SSH_USER }}" ]; then
            echo "::error::Missing repository secret HOSTINGER_SSH_USER"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            echo "::error::Add secrets at Settings → Secrets and variables → Actions"
            exit 1
          fi
      - run: npm ci
      - run: npm run build
      - name: Verify build output
        run: |
          test -f dist/index.html || (echo "::error::dist/index.html missing after build" && exit 1)
          echo "Build OK — $(find dist -type f | wc -l) files ready to deploy"
      - name: Deploy dist to Hostinger via SSH
        uses: easingthemes/ssh-deploy@v6.0.3
        with:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          REMOTE_PORT: ${{ secrets.HOSTINGER_SSH_PORT || '22' }}
          SOURCE: dist/
          TARGET: domains/mygirlhub.com/public_html/
          ARGS: -avz --delete
          SCRIPT_AFTER: |
            ls -la domains/mygirlhub.com/public_html/index.html
