name: Deploy to Hostinger

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  DEFAULT_SSH_PORT: 65002

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Verify Hostinger deploy secrets
        run: |
          missing=0
          if [ -z "${{ secrets.HOSTINGER_SSH_PRIVATE_KEY_B64 }}" ] && [ -z "${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}" ]; then
            echo "::error::Set HOSTINGER_SSH_PRIVATE_KEY_B64 (recommended) or HOSTINGER_SSH_PRIVATE_KEY"
            missing=1
          fi
          if [ -z "${{ secrets.HOSTINGER_SSH_HOST }}" ]; then
            echo "::error::Missing repository secret HOSTINGER_SSH_HOST"
            missing=1
          fi
          if [ -z "${{ secrets.HOSTINGER_SSH_USER }}" ]; then
            echo "::error::Missing repository secret HOSTINGER_SSH_USER"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi
      - run: npm ci
      - run: npm run build
      - name: Verify build output
        run: |
          test -f dist/index.html
          test -f dist/sitemap-index.xml
          echo "Build OK — $(find dist -type f | wc -l) files ready to deploy"
      - name: Setup deploy key
        run: |
          set -eo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          umask 177

          if [ -n "${{ secrets.HOSTINGER_SSH_PRIVATE_KEY_B64 }}" ]; then
            echo "Using HOSTINGER_SSH_PRIVATE_KEY_B64"
            echo "${{ secrets.HOSTINGER_SSH_PRIVATE_KEY_B64 }}" | tr -d '[:space:]' | base64 --decode > ~/.ssh/deploy_key
          else
            echo "Using HOSTINGER_SSH_PRIVATE_KEY"
            echo "${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
            sed -i 's/\r$//' ~/.ssh/deploy_key
          fi

          chmod 600 ~/.ssh/deploy_key
          if ! ssh-keygen -y -f ~/.ssh/deploy_key > ~/.ssh/deploy_key.pub; then
            echo "::error::Deploy key is invalid — re-create HOSTINGER_SSH_PRIVATE_KEY_B64 from mygirlhub_deploy"
            exit 1
          fi

          echo "Deploy key fingerprint (must match Hostinger):"
          ssh-keygen -lf ~/.ssh/deploy_key.pub
      - name: Deploy dist to Hostinger via rsync
        env:
          REMOTE_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          REMOTE_PORT: ${{ secrets.HOSTINGER_SSH_PORT || env.DEFAULT_SSH_PORT }}
        run: |
          set -eo pipefail

          SSH_CMD="ssh -p ${REMOTE_PORT} -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=20 -o StrictHostKeyChecking=no"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "$REMOTE_PORT" "$REMOTE_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          echo "Connecting as ${REMOTE_USER}@${REMOTE_HOST}:${REMOTE_PORT}"
          $SSH_CMD "$REMOTE_USER@$REMOTE_HOST" "echo 'SSH OK' && pwd"

          rsync -avz --delete \
            -e "$SSH_CMD" \
            dist/ "$REMOTE_USER@$REMOTE_HOST:domains/mygirlhub.com/public_html/"

          $SSH_CMD "$REMOTE_USER@$REMOTE_HOST" \
            "ls -la domains/mygirlhub.com/public_html/index.html domains/mygirlhub.com/public_html/sitemap-index.xml"
