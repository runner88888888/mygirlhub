name: Deploy to Hostinger

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  # Hostinger shared hosting uses 65002; VPS typically uses 22 (override via secret).
  DEFAULT_SSH_PORT: 65002

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Verify Hostinger deploy secrets
        run: |
          missing=0
          if [ -z "${{ secrets.HOSTINGER_SSH_PRIVATE_KEY_B64 }}" ] && [ -z "${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}" ]; then
            echo "::error::Set HOSTINGER_SSH_PRIVATE_KEY_B64 (recommended) or HOSTINGER_SSH_PRIVATE_KEY"
            missing=1
          fi
          if [ -z "${{ secrets.HOSTINGER_SSH_HOST }}" ]; then
            echo "::error::Missing repository secret HOSTINGER_SSH_HOST"
            missing=1
          fi
          if [ -z "${{ secrets.HOSTINGER_SSH_USER }}" ]; then
            echo "::error::Missing repository secret HOSTINGER_SSH_USER"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            echo "::error::Add secrets at Settings → Secrets and variables → Actions"
            exit 1
          fi
      - run: npm ci
      - run: npm run build
      - name: Verify build output
        run: |
          test -f dist/index.html || (echo "::error::dist/index.html missing after build" && exit 1)
          test -f dist/sitemap-index.xml || (echo "::error::dist/sitemap-index.xml missing after build" && exit 1)
          echo "Build OK — $(find dist -type f | wc -l) files ready to deploy"
      - name: Setup SSH agent
        run: |
          set -euo pipefail

          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          umask 177

          if [ -n "${{ secrets.HOSTINGER_SSH_PRIVATE_KEY_B64 }}" ]; then
            echo "Loading deploy key from HOSTINGER_SSH_PRIVATE_KEY_B64"
            echo "${{ secrets.HOSTINGER_SSH_PRIVATE_KEY_B64 }}" | tr -d '[:space:]' | base64 -d > ~/.ssh/deploy_key
          else
            echo "Loading deploy key from HOSTINGER_SSH_PRIVATE_KEY"
            echo "${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          fi

          chmod 600 ~/.ssh/deploy_key
          sed -i 's/\r$//' ~/.ssh/deploy_key
          if [ -n "$(tail -c 1 ~/.ssh/deploy_key 2>/dev/null || true)" ]; then
            echo >> ~/.ssh/deploy_key
          fi

          echo "Key file lines: $(wc -l < ~/.ssh/deploy_key)"
          echo "First line: $(head -1 ~/.ssh/deploy_key)"
          echo "Last line: $(tail -1 ~/.ssh/deploy_key)"

          if ! grep -q "BEGIN.*PRIVATE KEY" ~/.ssh/deploy_key; then
            echo "::error::Deploy key is malformed. Use HOSTINGER_SSH_PRIVATE_KEY_B64 instead."
            exit 1
          fi

          if ! ssh-keygen -y -f ~/.ssh/deploy_key > ~/.ssh/deploy_key.pub; then
            echo "::error::Deploy key is invalid. Add HOSTINGER_SSH_PRIVATE_KEY_B64 (see deploy workflow)."
            exit 1
          fi

          ssh-add ~/.ssh/deploy_key
          echo "Deploy public key fingerprint:"
          ssh-keygen -lf ~/.ssh/deploy_key.pub
      - name: Deploy dist to Hostinger via rsync
        env:
          REMOTE_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          REMOTE_PORT: ${{ secrets.HOSTINGER_SSH_PORT || env.DEFAULT_SSH_PORT }}
        run: |
          set -euo pipefail

          ssh-keyscan -p "$REMOTE_PORT" "$REMOTE_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          echo "Testing SSH authentication..."
          if ! ssh -p "$REMOTE_PORT" \
            -o BatchMode=yes -o ConnectTimeout=20 -o StrictHostKeyChecking=no \
            "$REMOTE_USER@$REMOTE_HOST" "echo 'SSH OK' && pwd"; then
            echo "::error::SSH authentication failed."
            echo "::error::Confirm the public key fingerprint above is in Hostinger hPanel → SSH Keys."
            exit 1
          fi

          echo "Syncing dist/ to domains/mygirlhub.com/public_html/ ..."
          rsync -avz --delete \
            -e "ssh -p $REMOTE_PORT -o StrictHostKeyChecking=no" \
            dist/ "$REMOTE_USER@$REMOTE_HOST:domains/mygirlhub.com/public_html/"

          ssh -p "$REMOTE_PORT" -o StrictHostKeyChecking=no \
            "$REMOTE_USER@$REMOTE_HOST" \
            "ls -la domains/mygirlhub.com/public_html/index.html domains/mygirlhub.com/public_html/sitemap-index.xml"
