name: Deploy to Hostinger

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  DEFAULT_SSH_PORT: 65002

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Verify Hostinger deploy secrets
        run: |
          missing=0
          if [ -z "${{ secrets.HOSTINGER_SSH_PRIVATE_KEY_B64 }}" ] && [ -z "${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}" ]; then
            echo "::error::Set HOSTINGER_SSH_PRIVATE_KEY_B64 (recommended) or HOSTINGER_SSH_PRIVATE_KEY"
            missing=1
          fi
          if [ -z "${{ secrets.HOSTINGER_SSH_HOST }}" ]; then
            echo "::error::Missing repository secret HOSTINGER_SSH_HOST"
            missing=1
          fi
          if [ -z "${{ secrets.HOSTINGER_SSH_USER }}" ]; then
            echo "::error::Missing repository secret HOSTINGER_SSH_USER"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi
      - run: npm ci
      - run: npm run build
      - name: Verify build output
        run: |
          test -f dist/index.html
          test -f dist/sitemap-index.xml
          echo "Build OK — $(find dist -type f | wc -l) files ready to deploy"
      - name: Setup SSH from base64 secret
        id: ssh_b64
        if: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY_B64 != '' }}
        run: |
          set -eo pipefail
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_PRIVATE_KEY_B64 }}" | tr -d '[:space:]' | base64 --decode > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > ~/.ssh/deploy_key.pub
          ssh-add ~/.ssh/deploy_key
          echo "Deploy key loaded from base64 secret:"
          ssh-keygen -lf ~/.ssh/deploy_key.pub
      - name: Setup SSH from raw secret
        if: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY_B64 == '' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          log-public-key: true
      - name: Deploy dist to Hostinger via rsync
        env:
          REMOTE_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          REMOTE_PORT: ${{ secrets.HOSTINGER_SSH_PORT || env.DEFAULT_SSH_PORT }}
        run: |
          set -eo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -p "$REMOTE_PORT" "$REMOTE_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -p "$REMOTE_PORT" -o BatchMode=yes -o ConnectTimeout=20 -o StrictHostKeyChecking=no \
            "$REMOTE_USER@$REMOTE_HOST" "echo 'SSH OK' && pwd"
          rsync -avz --delete \
            -e "ssh -p $REMOTE_PORT -o StrictHostKeyChecking=no" \
            dist/ "$REMOTE_USER@$REMOTE_HOST:domains/mygirlhub.com/public_html/"
          ssh -p "$REMOTE_PORT" -o StrictHostKeyChecking=no \
            "$REMOTE_USER@$REMOTE_HOST" \
            "ls -la domains/mygirlhub.com/public_html/index.html domains/mygirlhub.com/public_html/sitemap-index.xml"
